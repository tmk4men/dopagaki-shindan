<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ドパガキ診断 | スマホに脳を焼かれていないか診断</title>
  <meta name="description" content="スマホ依存・通知疲れ・SNS中毒・ドパミン過多を軽いノリで診断。8問であなたのホーム画面が脳にやさしいか診断します。" />

  <!-- OGP / Twitterカード（SNSシェア時のサムネ表示） -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="ドパガキ診断 | スマホに脳を焼かれていないか診断" />
  <meta property="og:description" content="通知、SNS、ショート動画、アプリの誘惑。あなたのホーム画面は、脳にやさしいですか？8問で診断。" />
  <meta property="og:url" content="https://tmk4men.github.io/dopagaki-shindan/" />
  <meta property="og:image" content="https://tmk4men.github.io/dopagaki-shindan/ogp.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1536" />
  <meta property="og:image:height" content="1024" />
  <meta property="og:site_name" content="ドパガキ診断" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ドパガキ診断 | スマホに脳を焼かれていないか診断" />
  <meta name="twitter:description" content="通知、SNS、ショート動画、アプリの誘惑。あなたのホーム画面は、脳にやさしいですか？8問で診断。" />
  <meta name="twitter:image" content="https://tmk4men.github.io/dopagaki-shindan/ogp.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="phone-frame">
    <main class="app" id="app">

      <!-- スタート画面 -->
      <section class="screen screen--start is-active" id="screen-start">
        <div class="badge-deco" aria-hidden="true">
          <span class="badge badge--1">3</span>
          <span class="badge badge--2">12</span>
          <span class="badge badge--3">99+</span>
        </div>

        <span class="kicker">SMARTPHONE BRAIN CHECK</span>
        <h1 class="title">
          ドパガキ<span class="title__accent">診断</span>
        </h1>
        <p class="main-copy">スマホに脳を焼かれていないか診断します。</p>
        <p class="sub-copy">
          通知、SNS、ショート動画、アプリの誘惑。<br />
          あなたのホーム画面は、脳にやさしいですか？
        </p>

        <button class="btn btn--primary" id="start-btn" type="button">
          診断を始める
        </button>

        <p class="meta-note">全8問 / 約1分</p>
      </section>

      <!-- 質問画面 -->
      <section class="screen screen--quiz" id="screen-quiz" hidden>
        <div class="quiz-header">
          <div class="progress" role="progressbar" aria-label="診断の進捗" aria-valuemin="0" aria-valuemax="8" aria-valuenow="1">
            <div class="progress__bar" id="progress-bar"></div>
          </div>
          <p class="quiz-count">
            <span id="current-num">1</span> / <span id="total-num">8</span>
          </p>
        </div>

        <div class="card" id="question-card">
          <button class="back-btn" id="back-btn" type="button" hidden aria-label="前の質問に戻る">
            ← 戻る
          </button>
          <p class="card__q-label">Q<span id="q-label-num">1</span></p>
          <h2 class="card__question" id="question-text" aria-live="polite"></h2>

          <div class="options" id="options" role="group" aria-label="選択肢"></div>
        </div>
      </section>

      <!-- 結果画面 -->
      <section class="screen screen--result" id="screen-result" hidden>
        <span class="result-type-tag" id="result-type-tag">YOUR TYPE</span>
        <div class="result-image-wrap" id="result-card">
          <img class="result-image" id="result-image" src="" alt="診断結果" />
        </div>

        <div class="result-actions">
          <button class="btn btn--share" id="share-btn" type="button">
            <svg class="x-logo" viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            Xで結果をシェア
          </button>
          <button class="btn btn--retry" id="retry-btn" type="button">
            もう一度診断する
          </button>
        </div>

        <p class="result-hash">#ドパガキ診断</p>
      </section>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
