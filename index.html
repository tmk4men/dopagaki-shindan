<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ドパガキ診断 | スマホに脳を焼かれていないか診断</title>
  <meta name="description" content="スマホ依存・通知疲れ・SNS中毒・ドパミン過多を軽いノリで診断。8問であなたのホーム画面が脳にやさしいか診断します。" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="phone-frame">
    <main class="app" id="app">

      <!-- スタート画面 -->
      <section class="screen screen--start is-active" id="screen-start">
        <div class="badge-deco" aria-hidden="true">
          <span class="badge badge--1">3</span>
          <span class="badge badge--2">12</span>
          <span class="badge badge--3">99+</span>
        </div>

        <h1 class="title">
          ドパガキ<span class="title__accent">診断</span>
        </h1>
        <p class="main-copy">スマホに脳を焼かれていないか診断します。</p>
        <p class="sub-copy">
          通知、SNS、ショート動画、アプリの誘惑。<br />
          あなたのホーム画面は、脳にやさしいですか？
        </p>

        <button class="btn btn--primary" id="start-btn" type="button">
          診断を始める
        </button>

        <p class="meta-note">全8問 / 約1分</p>
      </section>

      <!-- 質問画面 -->
      <section class="screen screen--quiz" id="screen-quiz" hidden>
        <div class="quiz-header">
          <div class="progress" role="progressbar" aria-label="診断の進捗" aria-valuemin="0" aria-valuemax="8" aria-valuenow="1">
            <div class="progress__bar" id="progress-bar"></div>
          </div>
          <p class="quiz-count">
            <span id="current-num">1</span> / <span id="total-num">8</span>
          </p>
        </div>

        <div class="card" id="question-card">
          <p class="card__q-label">Q<span id="q-label-num">1</span></p>
          <h2 class="card__question" id="question-text" aria-live="polite"></h2>

          <div class="options" id="options" role="group" aria-label="選択肢"></div>
        </div>
      </section>

      <!-- 結果画面 -->
      <section class="screen screen--result" id="screen-result" hidden>
        <div class="result-card" id="result-card">
          <p class="result-card__label">あなたは…</p>
          <h2 class="result-card__name" id="result-name"></h2>
          <p class="result-card__score">
            <span id="result-score">0</span><span class="result-card__score-max"> / 24点</span>
          </p>
          <p class="result-card__body" id="result-body"></p>

          <div class="advice">
            <h3 class="advice__title">📵 改善アドバイス</h3>
            <ul class="advice__list" id="advice-list"></ul>
          </div>
        </div>

        <div class="result-actions">
          <button class="btn btn--share" id="share-btn" type="button">
            Xで結果をシェア
          </button>
          <button class="btn btn--retry" id="retry-btn" type="button">
            もう一度診断する
          </button>
        </div>

        <p class="result-hash">#ドパガキ診断</p>
      </section>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
